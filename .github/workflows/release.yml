name: release

# main push 트리거. Changesets action이 두 모드로 동작한다.
#  - changeset md가 남아 있으면: Version PR(버전 bump + CHANGELOG) 자동 생성
#  - changeset md가 없으면(Version PR 머지 직후): publish step 실행
on:
  push:
    branches: [main]
  workflow_dispatch: # GITHUB_TOKEN으로 생성된 Version PR 머지는 push 트리거를 못 함 → 수동 실행 경로 확보

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false # 진행 중 publish는 취소하지 않음 (부분 publish 위험 회피)

permissions:
  contents: write # 버전 bump 커밋 + Version PR
  pull-requests: write # Version PR 생성

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Changesets가 git history 필요
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org
          scope: '@teamsparta-biz'
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r build # E 회귀 테스트가 dist/ 의존
      - run: pnpm -r test # B·E 회귀 게이트
      - name: Create Release PR or Publish
        uses: changesets/action@v1
        with:
          version: pnpm changeset version
          # `pnpm -C <dir> publish`는 pnpm 9.15에서 npm publish에 잘못된 package-spec을 넘겨 EUSAGE로 실패(로컬 재현 확인).
          # changeset publish는 패키지별 npm publish를 직접 호출하며 access는 .changeset/config.json(public) 적용.
          publish: pnpm changeset publish
          commit: 'chore: version packages'
          title: 'chore: version packages'
        env:
          # PR 생성·커밋은 자동 GITHUB_TOKEN, npmjs publish는 저장소 secret NPM_TOKEN 사용.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
