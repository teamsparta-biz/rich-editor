name: release

# main push 트리거. Changesets action이 두 모드로 동작한다.
#  - changeset md가 남아 있으면: Version PR(버전 bump + CHANGELOG) 자동 생성
#  - changeset md가 없으면(Version PR 머지 직후): publish step 실행
on:
  push:
    branches: [main]
  workflow_dispatch: # GITHUB_TOKEN으로 생성된 Version PR 머지는 push 트리거를 못 함 → 수동 실행 경로 확보

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false # 진행 중 publish는 취소하지 않음 (부분 publish 위험 회피)

permissions:
  contents: write # 버전 bump 커밋 + Version PR
  pull-requests: write # Version PR 생성
  packages: write # GitHub Packages publish (GITHUB_TOKEN 인증 근거)

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Changesets가 git history 필요
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://npm.pkg.github.com
          scope: '@teamsparta'
      # node20 동봉 npm 10.8.2는 `pnpm publish` 위임 시 인자(--git-checks 누수)를 거부해 EUSAGE로 실패한다.
      # 로컬 검증 결과 npm 11에선 동일 명령이 정상 동작 → publish 안정 버전으로 고정 (task 14-50, v0.5.0 게시 복구).
      - run: npm install -g npm@11
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r build # E 회귀 테스트가 dist/ 의존
      - run: pnpm -r test # B·E 회귀 게이트
      - name: Create Release PR or Publish
        uses: changesets/action@v1
        with:
          version: pnpm changeset version
          publish: pnpm -C packages/rich-editor publish --no-git-checks --access restricted
          commit: 'chore: version packages'
          title: 'chore: version packages'
        env:
          # 같은 org repo이므로 자동 GITHUB_TOKEN으로 PR 생성·Packages publish 모두 가능.
          # 별도 PAT(NPM_PUBLISH_TOKEN) 불필요 — 필요 시 NODE_AUTH_TOKEN만 PAT로 교체.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
